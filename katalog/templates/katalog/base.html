<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookArchive - UAS Praktikum Proyek Perangkat Lunak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">📦 BookArchive</a>
        
            <div class="ms-auto d-flex align-items-center">
                <!-- Tambahkan Link Tentang Kami di sini -->
                <a href="{% url 'tentang' %}" class="text-white text-decoration-none me-4 small">Tentang Kami</a>
            
                <a href="/admin" class="btn btn-primary btn-sm">Login Admin</a>
            </div>
        </div>
    </nav>

    

    <div class="container py-5">
        {% block content %}
        <!-- Konten Halaman Akan Muncul Di Sini -->
        {% endblock %}
    </div>

    <footer class="bg-white py-4 mt-auto border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 UAS PraktikumProyek Perangkat Lunak - Razian Sabri</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
