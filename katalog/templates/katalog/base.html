<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookArchive - UAS Praktikum Proyek Perangkat Lunak</title>
    
    <!-- CSS: Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* 1. Animasi Fade In saat Halaman Dimuat */
        body {
            animation: fadeInAnimation ease 1.5s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }
        @keyframes fadeInAnimation {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 2. Hover Card */
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }

        /* 3. Gaya Tombol Back to Top */
        #btn-back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none; /* Awalnya sembunyi */
            width: 50px;
            height: 50px;
            z-index: 1000;
            transition: all 0.3s ease;
            border: none;
        }
        #btn-back-to-top:hover {
            transform: scale(1.2);
            background-color: #0b5ed7;
        }
    </style>
</head>

<body class="bg-light">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">📦 BookArchive</a>
        
            <div class="ms-auto d-flex align-items-center">
                <a href="{% url 'tentang' %}" class="text-white text-decoration-none me-4 small">Tentang Kami</a>
                <a href="/admin" class="btn btn-primary btn-sm px-3">Login Admin</a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container py-5" style="min-height: 80vh;">
        {% block content %}
        <!-- Konten dari file lain akan muncul di sini -->
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <h4 class="fw-bold mb-3">BookArchive</h4>
            <p class="text-secondary small">Sistem Informasi Perpustakaan Digital untuk Manajemen Koleksi Buku Modern.</p>
            
            <div class="mb-4">
                <a href="https://www.instagram.com/" target="_blank" class="text-white mx-2 text-decoration-none small">
                    <i class="bi bi-instagram"></i> Instagram
                </a>
                <a href="https://github.com/raziansabri04/UAS_PPL_KatalogBuku" target="_blank" class="text-white mx-2 text-decoration-none small">
                    <i class="bi bi-github"></i> GitHub
                </a>
                <a href="https://www.linkedin.com/" target="_blank" class="text-white mx-2 text-decoration-none small">
                    <i class="bi bi-linkedin"></i> LinkedIn
                </a>
            </div>
            
            <hr class="bg-secondary opacity-25">
            <p class="small text-secondary mb-0">&copy; 2026 Praktikum Proyek Perangkat Lunak - Razian Sabri</p>
        </div>
    </footer>

    <!-- TOMBOL BACK TO TOP (Elemen HTML) -->
    <button type="button" id="btn-back-to-top" class="btn btn-primary rounded-circle shadow-lg text-white">
        <i class="bi bi-chevron-up fw-bold"></i>
    </button>

    <!-- JAVASCRIPT: Bootstrap & Custom Logic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Ambil elemen tombol
        const mybutton = document.getElementById("btn-back-to-top");

        // Ketika user scroll ke bawah 300px dari atas, munculkan tombol
        window.onscroll = function () {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        };

        // Ketika tombol diklik, scroll ke atas secara halus (smooth)
        mybutton.addEventListener("click", function() {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>
</body>
</html>
